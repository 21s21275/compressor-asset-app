<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High Tower Engineering - Login</title>
  <meta name="theme-color" content="#1e3a8a">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <div class="login-container">
      <header class="login-header">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect width="24" height="24" fill="black"/>
              <text x="12" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">HTE</text>
            </svg>
          </div>
          <div class="brandText">
            <h1>High Tower Engineering</h1>
            <p class="subtitle">Compressor Asset Management</p>
          </div>
        </div>
      </header>

      <div class="login-form">
        <h2>Company Login</h2>
        <form id="login-form">
          <div class="field">
            <label for="username">Username</label>
            <div class="control">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7.5 20.25c1.9-2.45 4-3.55 6.75-3.55s4.85 1.1 6.75 3.55" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <path d="M12 12.75a4.25 4.25 0 1 0 0-8.5 4.25 4.25 0 0 0 0 8.5Z" stroke="currentColor" stroke-width="1.6"/>
                </svg>
              </span>
              <input
                type="text"
                id="username"
                name="username"
                required
                autocomplete="username"
                placeholder="Enter company username"
              >
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="control">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <circle cx="12" cy="16" r="1" fill="currentColor"/>
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                required
                autocomplete="current-password"
                placeholder="Enter company password"
              >
            </div>
          </div>

          <div class="actions">
            <button type="submit" id="login-btn">
              <span class="btnText">Login</span>
              <span class="btnSpinner" aria-hidden="true"></span>
            </button>
          </div>
        </form>

        <div id="message" class="toast" aria-live="polite" hidden></div>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 High Tower Engineering LLC</p>
    </footer>
  </main>

  <script src="/login.js"></script>
</body>
</html>
