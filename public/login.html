<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High Tower Engineering - Login</title>
  <meta name="theme-color" content="#1e3a8a">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="container">
    <div class="login-container">
      <header class="login-header">
        <div class="brand">
          <div class="mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <rect width="24" height="24" fill="black"/>
              <text x="12" y="16" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#1e3a8a" text-anchor="middle">HTE</text>
            </svg>
          </div>
          <div class="brandText">
            <h1>High Tower Engineering</h1>
            <p class="subtitle">Compressor Asset Management</p>
          </div>
        </div>
      </header>

      <div class="login-form">
        <h2>Company Login</h2>
        <form id="login-form">
          <div class="field">
            <label for="username">Username</label>
            <div class="control">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="M7.5 20.25c1.9-2.45 4.25-4.25 6.75-4.25 9.75-1.55 13.25-1.55 16.75-1.55 20.25" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <path d="M20.25 8.75a1.25 1.25 0 2.5 2.5 0 1.25-1.25-1.25-2.5 0-2.5-2.5 0-1.25 1.25 1.25 0 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </span>
              <input
                type="text"
                id="username"
                name="username"
                required
                placeholder="Enter your username"
                autocomplete="username"
              >
            </div>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="control">
              <span class="icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="11" width="18" height="11" rx="2" stroke="currentColor" stroke-width="1.6"/>
                  <circle cx="12" cy="16" r="1" fill="currentColor"/>
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                required
                placeholder="Enter your password"
                autocomplete="current-password"
              >
              <button
                type="button"
                id="toggle-password"
                title="Toggle password visibility"
              >
                <svg id="eye-icon" viewBox="0 0 24 24" fill="none" width="20" height="20">
                  <path d="M1 12s4-8 11-8 11 8M12 12s-4 8-11 8-11-8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <circle cx="12" cy="12" r="3" fill="currentColor"/>
                </svg>
                <svg id="eye-off-icon" viewBox="0 0 24 24" fill="none" width="20" height="20" style="display: none;">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-2.17 0-4.23-.57-6-1.57M9.06 9.06A10.07 10.07 0 0 1 12 4c2.17 0 4.23.57 6 1.57" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
          </div>

          <div class="actions">
            <button type="submit" id="login-btn" data-busy="false">
              <span class="btnText">Sign In</span>
              <span class="btnSpinner" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="31.416" stroke-dashoffset="15.708" stroke-linecap="round">
                    <animate attributeName="stroke-dashoffset" from="15.708" to="47.124" dur="0.6s" repeatCount="indefinite"/>
                  </circle>
                </svg>
              </span>
            </button>
          </div>
        </form>
        <div id="message" class="toast" hidden></div>
      </div>
    </div>

    <footer class="footer">
      <p>&copy; 2026 High Tower Engineering LLC</p>
    </footer>
  </main>

  <script src="./login.js"></script>
</body>
</html>
